version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: car-maintenance-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: car_maintenance_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - car-network

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: car-maintenance-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/car_maintenance_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      ANALYTICS_SERVICE_URL: http://analytics:5000
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - analytics
    networks:
      - car-network

  # Python Analytics Service
  analytics:
    build:
      context: ./analytics
      dockerfile: Dockerfile
    container_name: car-maintenance-analytics
    restart: unless-stopped
    ports:
      - "5000:5000"
    networks:
      - car-network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: car-maintenance-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - car-network

networks:
  car-network:
    driver: bridge

volumes:
  mysql_data:
